<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>JOINNOW.TV - Dashboard</title>
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="nav-bar beveled-box">
            <div class="nav-links">
                <button class="nav-btn">Videos</button>
                <button class="nav-btn">Audio</button>
            </div>
            <h1 class="logo">JOINNOW.TV</h1>
            <div class="nav-links">
                <button class="nav-btn" data-content="shop">Shop</button>
                <button class="nav-btn" data-content="privacy">privacy / terms / help</button>
            </div>
        </header>

        <div class="flex-row">
            <div class="flex-row">
                 <section class="beveled-box carousel-section">
                     <div class="img-frame">
                         <img id="carousel-img" src="https://picsum.photos/id/10/400/600" alt="Gallery">
                     </div>
                     <div class="controls">
                         <button onclick="updateCarousel(-1)">◀</button>
                         <span id="carousel-counter">1/7</span>
                         <button onclick="updateCarousel(1)">▶</button>
                     </div>
                 </section>

                 <section class="flex-column">
                     <div class="beveled-box gif-ad-container">
                         <span class="label">GIF AD</span>
                         <div class="gif-placeholder">
                             <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJia3F6Znd6Znd6Znd6/giphy.gif" alt="Vintage Ad">
                         </div>
                     </div>

                     <div class="buy-sem-oval">
                         <a href="#" data-content="sem">Buy SEM</a>
                     </div>
                 </section>
            </div>
            <section class="beveled-box video-player-themed">
              <div class="cctv-header">
                  <div class="playback-icons">▶ || [ ]</div>
                  <div class="video-status">
                      NOW PLAYING:<br>
                      <span class="glitch-text" id="video-title">Episode 8 - SEM</span>
                  </div>
              </div>
          
              <div class="monitor-screen">
                  <div class="iframe-container">
                      <iframe 
                          id="main-video"
                          src="https://www.youtube.com/embed/VIDEO_ID_HERE?autoplay=1&mute=1&controls=0&loop=1" 
                          title="YouTube video player" 
                          frameborder="0" 
                  
                          allowfullscreen>
                      </iframe>
                  </div>
                  <div class="scanline"></div>
              </div>
          
              <div class="video-footer-nav">
                  <button class="arrow-btn" onclick="prevVideo()">◀</button>
                  <span class="desc-text" id="video-desc">Video description and whatnot</span>
                  <button class="arrow-btn" onclick="nextVideo()">▶</button>
              </div>
          </section>

            <section class="beveled-box guestbook-section">
                <div class="section-header">Guestbook / Confessional</div>
                <div class="comment-wall" id="guestbook">
                    <p><span class="user-id">[USER_88]:</span> site looks clean.</p>
                    <p><span class="user-id">[SYSTEM]:</span> welcoming new terminal...</p>
                </div>
            </section>
        </div>
    </div>

    <script src="content.js"></script>
    <script>
        // Inline Carousel logic if not in content.js
        const images = [
            "https://picsum.photos/id/10/400/600",
            "https://picsum.photos/id/11/400/600",
            "https://picsum.photos/id/12/400/600",
            "https://picsum.photos/id/13/400/600",
            "https://picsum.photos/id/14/400/600",
            "https://picsum.photos/id/15/400/600",
            "https://picsum.photos/id/16/400/600"
        ];
        let idx = 0;
        function updateCarousel(dir) {
            idx = (idx + dir + images.length) % images.length;
            document.getElementById('carousel-img').src = images[idx];
            document.getElementById('carousel-counter').innerText = `${idx + 1}/7`;
        }
    </script>
</body>
</html>
