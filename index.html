<!DOCTYPE html>
<html>
<head>
    <script src="//unpkg.com/globe.gl"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p>LOADING...</p>
</div>

<div id="globeViz"></div>
<a href="dashboard.html" class="beveled-box" style="position: fixed; bottom: 30px; right: 30px;">ENTER SITE -></a>

<script>
    const myGlobe = Globe()(document.getElementById('globeViz'))
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
        .backgroundColor('#000000')
        .onGlobeReady(() => {
            // This hides the loader only once the globe is actually loaded
            document.getElementById('loader').classList.add('fade-out');
            setTimeout(() => document.getElementById('loader').remove(), 1000);
        });

    // Slow spin logic
    let angle = 0;
    setInterval(() => {
        myGlobe.pointOfView({ lng: angle, lat: 0, altitude: 2.5 }, 0);
        angle += 0.1;
    }, 50);
</script>

</body>
</html>
