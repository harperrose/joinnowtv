<!DOCTYPE html>
<html>
<head>
    <script src="//unpkg.com/globe.gl"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader">LOADING...</div>
    <div id="globeViz"></div>
    
    <a href="dashboard.html" class="enter-btn beveled-box" style="position:fixed; bottom:20px; right:20px;">
        ENTER SITE ->
    </a>

    <script>
        const myGlobe = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
            .backgroundColor('#000000')
            .ringColor(() => 'red')
            .ringMaxRadius(2)
            .ringRepeat(3);

        // Define Red Hotspots
        const gData = [{ lat: 34.05, lng: -118.24, size: 1, text: 'LA' }];
        myGlobe.ringsData(gData);

        // Remove loader after 2s
        setTimeout(() => document.getElementById('loader').style.display='none', 2000);
    </script>
</body>
</html>
